aid: varo
name: Varo Bank
description: Varo Bank is a mobile-first, FDIC-chartered digital bank offering fee-free
  checking and high-yield savings accounts, early direct deposit, instant cash advances,
  a credit-builder card, and a personal line of credit. Its consumer-facing APIs power
  high-yield savings, fee-free overdraft protection, instant transfers, and cash advance
  features for personal financial services. Third-party integration is available via
  Open Banking aggregators such as Plaid.
