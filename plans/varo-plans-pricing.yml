name: Varo Bank Plans and Pricing
description: Pricing and fee structure for Varo Bank consumer banking products, including bank accounts, savings, cash advances, and credit products.
url: https://www.varomoney.com/
plans:

  - name: Varo Bank Account
    description: No-fee digital checking account with early direct deposit and fee-free ATM access.
    url: https://www.varomoney.com/bank-account/
    price: 0.00
    currency: USD
    billing: monthly
    features:
      - No monthly maintenance fees
      - No minimum balance requirement
      - No overdraft fees
      - Early direct deposit up to 2 days early
      - Free debit card
      - 55,000+ fee-free Allpoint ATMs
      - Fee-free cash deposits at 7,500+ CVS locations
      - Cashback rewards on gas, groceries, and dining
