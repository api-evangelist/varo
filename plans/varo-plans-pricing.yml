        value: "$3.50 per transaction"

  - name: Varo Savings Account
    description: High-yield savings account with up to 5.00% APY on balances up to $5,000.
    url: https://www.varomoney.com/savings-account/
    price: 0.00
    currency: USD
    billing: monthly
    features:
      - No monthly fees
      - No minimum balance requirement
      - Up to 5.00% APY on first $5,000
      - Base APY of 2.50% on balances over $5,000
      - Auto-savings tools
    limits:
      - name: High-yield APY cap
        value: "$5,000 balance limit for 5.00% APY"

  - name: Varo Advance (Cash Advance)
    description: Short-term cash advances with a flat fee, no interest charges.
    url: https://www.varomoney.com/cash-advance/
    price: variable
    currency: USD
    billing: per-use
    features:
      - No interest charges
      - Instant access to funds
