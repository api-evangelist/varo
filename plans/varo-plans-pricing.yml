    url: https://www.varomoney.com/line-of-credit/
    price: variable
    currency: USD
    billing: per-use
    features:
      - No interest charges
      - Single flat fee
      - Repayment terms up to 12 months
      - No late fees
      - No prepayment penalties
      - Credit limit up to $2,000

  - name: Varo Believe Credit-Builder Card
    description: Secured Visa credit card designed to help customers build or improve their credit score.
    url: https://www.varomoney.com/credit-builder/
    price: 0.00
    currency: USD
    billing: monthly
    features:
      - No annual fee
      - No interest charges (secured card)
      - Credit score tracking
      - Average 40+ point credit score increase after 3 months of on-time payments
      - Reports to major credit bureaus
